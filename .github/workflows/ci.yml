name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.3

      - name: Ruff check
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npx eslint src/ --ext .ts,.tsx || true

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bluewave_test
          POSTGRES_USER: bluewave
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://bluewave:testpass@localhost:5432/bluewave_test
          DATABASE_URL_SYNC: postgresql://bluewave:testpass@localhost:5432/bluewave_test
          JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
        run: cd backend && alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://bluewave:testpass@localhost:5432/bluewave_test
          DATABASE_URL_SYNC: postgresql://bluewave:testpass@localhost:5432/bluewave_test
          JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
          ENV: development
        run: cd backend && python -m pytest --cov=app --cov-fail-under=60 -v

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npx vitest run --coverage || true

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t bluewave-backend ./backend

      - name: Build frontend image
        run: docker build -t bluewave-frontend ./frontend
